<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="colmar.css">
    <title>ColmarAcademy</title>
</head>
<body>



    <header class="header">
    <!--Header ของ หน้าจอคอม-->
        <div class="header-desktop">
            <div class="logo">
                <img src="ic-logo.svg" alt="logo colmar academy">
                <span class="logo-colmar">COLMAR</span><span class="logo-academy">ACADEMY</span>
            </div>
                <nav class="nav-link">
                    <a href="#">On campus</a>
                    <a href="#">Online</a>
                    <a href="#">For companies</a>
                    <a href="#">Sign in</a>
                </nav>
        </div>
    <!--Header ของ มือถือ-->
        <nav class="mobile-link">
            <img src="ic-logo.svg" alt="logo colmar academy">
            <img src="ic-on-campus.svg" alt="logo On campus">
            <img src="ic-online.svg" alt="logo online">
            <img src="ic-login.svg" alt="logo login">
        </nav>
   
    </header>



    <main>

        <!--ส่วนของคอมด้านบน banner (Learn Something)-->
      <section class="banner">
            <div class="banner-image">
                <img src="banner.jpg" alt="Students studying">
            </div>
            <div class="banner-content">
                <h1>Learn something new everyday</h1>
                <p  class="text-large">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                <a href="#" class="btn-start">Start here</a>
            </div>
        </section>

    </main>    
</body>
</html>
